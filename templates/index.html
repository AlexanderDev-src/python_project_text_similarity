<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Similarity Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="container">

        <header class="site-header">
            <h1 class="site-title">
                <span class="site-title-icon">✦</span>
                Text Similarity Checker
            </h1>
        </header>

        <section class="config-section">
            <div class="api-key-wrapper">
                <div
                    style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem;">
                    <label for="api_key" class="api-key-label" style="margin-bottom: 0;">🔑 MinerU API Key</label>
                    <a href="https://mineru.net" target="_blank" class="get-api-link">Get API Key &rarr;</a>
                </div>
                <!-- Use type="password" to hide the key, but we'll also use JS to store it in memory -->
                <input type="password" id="api_key" class="api-key-input"
                    placeholder="Enter your MinerU API Key securely...">
            </div>
        </section>

        <main class="split-layout">
            <!-- Document 1 -->
            <div class="doc-card">
                <div class="doc-header">
                    <h3 class="doc-title">Document 1</h3>
                    <div class="fetch-controls">
                        <input type="text" id="url1" class="url-input"
                            placeholder="Enter PDF URL (e.g. Google Drive Link)">
                        <button id="fetch1" class="btn-fetch">Fetch Details</button>
                    </div>
                </div>
                <textarea id="text1" class="doc-textarea"
                    placeholder="Paste text here or fetch from URL to generate text..."></textarea>
            </div>

            <!-- Document 2 -->
            <div class="doc-card">
                <div class="doc-header">
                    <h3 class="doc-title">Document 2</h3>
                    <div class="fetch-controls">
                        <input type="text" id="url2" class="url-input"
                            placeholder="Enter PDF URL (e.g. Google Drive Link)">
                        <button id="fetch2" class="btn-fetch">Fetch Details</button>
                    </div>
                </div>
                <textarea id="text2" class="doc-textarea"
                    placeholder="Paste text here or fetch from URL to generate text..."></textarea>
            </div>
        </main>

        <section class="action-area">
            <button id="analyzeBtn" class="btn-analyze">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                </svg>
                Analyze Similarity
            </button>
        </section>

        <div id="result" class="result-card">
            <!-- Result content injected via JS -->
        </div>

    </div>

    <!-- Inject separated JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
